<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Control Horario">
    <meta name="theme-color" content="#1e40af">
    <title>Control de Horario Laboral</title>
    
    <link rel="manifest" href="#" id="manifest-placeholder">
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAGxSURBVHgB7ZbBTsJAEIZnWqgHPRgPnowH9QF8AB/AeOCkN0+eOJoY4wvi1RfwBXwAPXjy5MmDRw9qQnedbWkp3W67S4iJ/slmO7Mz/2xnZ7YF/jNUABfYAPaADrAJrAErgAKWgSYQAz/AA3AJXAE3wDcw11iBHnAMHACNnL4RMA68AMPcHuR0BPQB6TsPuAb6wAVQBxQgX8QCugDeAc1rDaBXxALOgL0CvgawXcQCdgv4GsBuEQswBXzLwLZM1KsCh4AH5ItYwBHwCjzm9iCnI6CZ1fHVKwpsa3wbOM3pm5FtYL+Ahd3rAJ+Z6z6gtcLOI2JBK8Rq08GpAp0p9ovb0MwFaL0AewNPJmoDP0TSpus+UsvFTgN+nfp1ShcgWyPNYL+IZVmH27hODUB+xtKkTdOZEaB/mtLkXEAmNm1Tk5MDkImNm7RpOhOQiU3a1KS1AZnYuE1NWhOQiU2atGk6N5CJTZp0aTorsJ3YtElrAzKxSZs2TWcCMrFxk65JZwW2E5s2aU1AJjZt06Zpe5YSAO2c18AtsOyeR0T7n/ILbCWQ+uPpB6gAAAAASUVORK5CYII=">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --primary-light: #3b82f6;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-bottom: 80px;
            color: var(--gray-900);
            overflow-x: hidden;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-md);
            border-bottom: 3px solid var(--primary);
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .header-icon {
            font-size: 28px;
        }
        
        .balance-badge {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: var(--shadow-md);
        }
        
        .balance-badge.positive {
            background: linear-gradient(135deg, var(--success), #10b981);
        }
        
        .balance-badge.negative {
            background: linear-gradient(135deg, var(--danger), #ef4444);
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .view-selector {
            display: flex;
            gap: 8px;
            background: white;
            padding: 8px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            margin-bottom: 20px;
        }
        
        .view-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--gray-600);
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Outfit', sans-serif;
        }
        
        .view-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }
        
        .card {
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.4s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--gray-100);
        }
        
        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--gray-900);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .date-picker {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--gray-50);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        
        .date-picker input {
            flex: 1;
            border: 2px solid var(--gray-200);
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-700);
            font-family: 'Inter', sans-serif;
        }
        
        .date-nav-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .date-nav-btn:active {
            transform: scale(0.95);
        }
        
        .time-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .input-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-group input,
        .input-group textarea {
            border: 2px solid var(--gray-200);
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            color: var(--gray-900);
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
        }
        
        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            box-shadow: var(--shadow-md);
        }
        
        .btn-primary:active {
            transform: translateY(1px);
            box-shadow: var(--shadow-sm);
        }
        
        .btn-secondary {
            background: var(--gray-100);
            color: var(--gray-700);
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--success), #10b981);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #ef4444);
            color: white;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .stat-card {
            background: var(--gray-50);
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }
        
        .stat-card.success {
            border-left-color: var(--success);
        }
        
        .stat-card.danger {
            border-left-color: var(--danger);
        }
        
        .stat-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--gray-900);
            font-family: 'Outfit', sans-serif;
        }
        
        .records-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .record-item {
            background: var(--gray-50);
            padding: 16px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary);
            animation: slideUp 0.3s ease-out;
        }
        
        .record-item.official {
            border-left-color: var(--primary);
        }
        
        .record-item.recovery {
            border-left-color: var(--success);
        }
        
        .record-info {
            flex: 1;
        }
        
        .record-date {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 4px;
        }
        
        .record-times {
            font-size: 13px;
            color: var(--gray-600);
            display: flex;
            gap: 12px;
        }
        
        .record-concept {
            font-size: 12px;
            color: var(--gray-500);
            font-style: italic;
            margin-top: 4px;
        }
        
        .record-hours {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Outfit', sans-serif;
        }
        
        .record-hours.negative {
            color: var(--danger);
        }
        
        .record-hours.positive {
            color: var(--success);
        }
        
        .delete-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
        }
        
        .delete-btn:active {
            transform: scale(0.9);
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 100;
            border-top: 2px solid var(--gray-200);
        }
        
        .bottom-nav-content {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            gap: 8px;
        }
        
        .nav-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--gray-500);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            border-radius: 8px;
        }
        
        .nav-btn.active {
            color: var(--primary);
            background: rgba(30, 64, 175, 0.1);
        }
        
        .nav-btn span {
            font-size: 20px;
        }
        
        .export-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray-500);
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
        }
        
        .week-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .day-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--gray-50);
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
        }
        
        .day-cell.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary-dark);
        }
        
        .day-cell.has-records {
            border-color: var(--success);
        }
        
        .day-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .day-number {
            font-size: 16px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
        }
        
        .month-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 16px;
        }
        
        .month-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--gray-50);
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        
        .month-day.today {
            background: var(--primary-light);
            color: white;
        }
        
        .month-day.selected {
            background: var(--primary);
            color: white;
        }
        
        .month-day.has-records::after {
            content: '';
            position: absolute;
            bottom: 2px;
            width: 4px;
            height: 4px;
            background: var(--success);
            border-radius: 50%;
        }
        
        .month-day.other-month {
            opacity: 0.3;
        }
        
        .hidden {
            display: none !important;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--gray-500);
        }
        
        @media (max-width: 400px) {
            .header h1 {
                font-size: 18px;
            }
            
            .balance-badge {
                font-size: 12px;
                padding: 6px 12px;
            }
            
            .time-inputs {
                grid-template-columns: 1fr;
            }
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            z-index: 1000;
            animation: toastIn 0.3s ease-out;
        }
        
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1><span class="header-icon">⏰</span> Control Horario</h1>
            <div class="balance-badge" id="headerBalance">0h 0m</div>
        </div>
    </div>
    
    <div class="container">
        <!-- View Selector -->
        <div class="view-selector">
            <button class="view-btn active" data-view="day">Día</button>
            <button class="view-btn" data-view="week">Semana</button>
            <button class="view-btn" data-view="month">Mes</button>
        </div>
        
        <!-- Date Navigation -->
        <div class="card">
            <div class="date-picker">
                <button class="date-nav-btn" id="prevDate">←</button>
                <input type="date" id="currentDate">
                <button class="date-nav-btn" id="nextDate">→</button>
            </div>
            
            <!-- Week Calendar (hidden by default) -->
            <div class="week-calendar hidden" id="weekCalendar"></div>
            
            <!-- Month Calendar (hidden by default) -->
            <div class="month-calendar hidden" id="monthCalendar"></div>
        </div>
        
        <!-- Statistics Dashboard -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">📊 Balance General</h2>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Horas Oficiales</div>
                    <div class="stat-value" id="officialHours">0h</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-label">Recuperación</div>
                    <div class="stat-value" id="recoveryHours">0h</div>
                </div>
                <div class="stat-card danger">
                    <div class="stat-label">Déficit</div>
                    <div class="stat-value" id="deficitHours">0h</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Balance Final</div>
                    <div class="stat-value" id="balanceHours">0h</div>
                </div>
            </div>
        </div>
        
        <!-- Official Schedule Section -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">🏢 Horario Oficial</h2>
            </div>
            <div class="time-inputs">
                <div class="input-group">
                    <label>Hora Entrada</label>
                    <input type="time" id="officialEntrada" value="07:00">
                </div>
                <div class="input-group">
                    <label>Hora Salida</label>
                    <input type="time" id="officialSalida" value="15:00">
                </div>
            </div>
            <button class="btn btn-primary" id="saveOfficial">
                <span>💾</span> Guardar Registro Oficial
            </button>
            
            <div id="officialRecords" class="records-list" style="margin-top: 20px;"></div>
        </div>
        
        <!-- Recovery Hours Section -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">⚡ Recuperación de Horas</h2>
            </div>
            <div class="time-inputs">
                <div class="input-group">
                    <label>Hora Entrada</label>
                    <input type="time" id="recoveryEntrada">
                </div>
                <div class="input-group">
                    <label>Hora Salida</label>
                    <input type="time" id="recoverySalida">
                </div>
            </div>
            <div class="input-group" style="margin-bottom: 16px;">
                <label>Concepto de Trabajo</label>
                <textarea id="recoveryConcept" placeholder="Describe el trabajo realizado..."></textarea>
            </div>
            <button class="btn btn-success" id="saveRecovery">
                <span>✅</span> Guardar Recuperación
            </button>
            
            <div id="recoveryRecords" class="records-list" style="margin-top: 20px;"></div>
        </div>
        
        <!-- Export Section -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">📤 Exportar / Compartir</h2>
            </div>
            <div class="export-buttons">
                <button class="btn btn-primary" id="exportExcel">
                    <span>📊</span> Excel
                </button>
                <button class="btn btn-primary" id="exportPDF">
                    <span>📄</span> PDF
                </button>
                <button class="btn btn-secondary" id="exportJSON">
                    <span>💾</span> Backup JSON
                </button>
                <button class="btn btn-secondary" id="importJSON">
                    <span>📥</span> Restaurar
                </button>
            </div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="bottom-nav-content">
            <button class="nav-btn active" data-section="official">
                <span>🏢</span>
                Oficial
            </button>
            <button class="nav-btn" data-section="recovery">
                <span>⚡</span>
                Recuperación
            </button>
            <button class="nav-btn" data-section="stats">
                <span>📊</span>
                Balance
            </button>
            <button class="nav-btn" data-section="export">
                <span>📤</span>
                Exportar
            </button>
        </div>
    </div>
    
    <input type="file" id="fileInput" accept=".json" style="display: none;">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
                const CACHE_NAME = 'control-horario-v1';
                const urlsToCache = ['/'];
                
                self.addEventListener('install', event => {
                    event.waitUntil(
                        caches.open(CACHE_NAME)
                            .then(cache => cache.addAll(urlsToCache))
                    );
                });
                
                self.addEventListener('fetch', event => {
                    event.respondWith(
                        caches.match(event.request)
                            .then(response => response || fetch(event.request))
                    );
                });
            `)).catch(err => console.log('SW registration failed:', err));
        }
        
        // Manifest
        const manifestData = {
            name: "Control de Horario Laboral",
            short_name: "Control Horario",
            start_url: ".",
            display: "standalone",
            background_color: "#1e40af",
            theme_color: "#1e40af",
            description: "Sistema de control de horario laboral y recuperación de horas",
            icons: [{

        // Data Management
        class DataManager {
            constructor() {
                this.officialRecords = this.load('officialRecords') || [];
                this.recoveryRecords = this.load('recoveryRecords') || [];
            }
            
            load(key) {
                const data = localStorage.getItem(key);
                return data ? JSON.parse(data) : null;
            }
            
            save(key, data) {
                localStorage.setItem(key, JSON.stringify(data));
            }
            
            addOfficial(record) {
                this.officialRecords.push(record);
                this.save('officialRecords', this.officialRecords);
            }
            
            addRecovery(record) {
                this.recoveryRecords.push(record);
                this.save('recoveryRecords', this.recoveryRecords);
            }
            
            deleteOfficial(index) {
                this.officialRecords.splice(index, 1);
                this.save('officialRecords', this.officialRecords);
            }
            
            deleteRecovery(index) {
                this.recoveryRecords.splice(index, 1);
                this.save('recoveryRecords', this.recoveryRecords);
            }
            
            getRecordsInRange(startDate, endDate) {
                const start = new Date(startDate);
                const end = new Date(endDate);
                end.setHours(23, 59, 59, 999);
                
                const official = this.officialRecords.filter(r => {
                    const d = new Date(r.date);
                    return d >= start && d <= end;
                });
                
                const recovery = this.recoveryRecords.filter(r => {
                    const d = new Date(r.date);
                    return d >= start && d <= end;
                });
                
                return { official, recovery };
            }
            
            exportAll() {
                return {
                    version: '1.0',
                    exportDate: new Date().toISOString(),
                    officialRecords: this.officialRecords,
                    recoveryRecords: this.recoveryRecords
                };
            }
            
            importAll(data) {
                if (data.officialRecords) {
                    this.officialRecords = data.officialRecords;
                    this.save('officialRecords', this.officialRecords);
                }
                if (data.recoveryRecords) {
                    this.recoveryRecords = data.recoveryRecords;
                    this.save('recoveryRecords', this.recoveryRecords);
                }
            }
        }
        
        // Time Calculations
        class TimeCalculator {
            static parseTime(timeStr) {
                const [hours, minutes] = timeStr.split(':').map(Number);
                return hours * 60 + minutes;
            }
            
            static minutesToHours(minutes) {
                const hours = Math.floor(Math.abs(minutes) / 60);
                const mins = Math.abs(minutes) % 60;
                const sign = minutes < 0 ? '-' : '';
                return `${sign}${hours}h ${mins}m`;
            }
            
            static calculateDuration(entrada, salida) {
                const start = this.parseTime(entrada);
                const end = this.parseTime(salida);
                return end - start;
            }
            
            static calculateDeficit(entrada, salida) {
                const worked = this.calculateDuration(entrada, salida);
                const expected = 8 * 60; // 8 hours
                return expected - worked;
            }
            
            static isWeekday(date) {
                const day = new Date(date).getDay();
                return day !== 0 && day !== 6; // Not Sunday or Saturday
            }
        }
        
        // App Controller
        class AppController {
            constructor() {
                this.dataManager = new DataManager();
                this.currentView = 'day';
                this.currentDate = new Date();
                this.init();
            }
            
            init() {
                this.setupEventListeners();
                this.updateDatePicker();
                this.renderView();
            }
            
            setupEventListeners() {
                // View selector
                document.querySelectorAll('.view-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentView = e.target.dataset.view;
                        this.renderView();
                    });
                });
                
                // Date navigation
                document.getElementById('prevDate').addEventListener('click', () => this.navigateDate(-1));
                document.getElementById('nextDate').addEventListener('click', () => this.navigateDate(1));
                document.getElementById('currentDate').addEventListener('change', (e) => {
                    this.currentDate = new Date(e.target.value);
                    this.renderView();
                });
                
                // Save buttons
                document.getElementById('saveOfficial').addEventListener('click', () => this.saveOfficial());
                document.getElementById('saveRecovery').addEventListener('click', () => this.saveRecovery());
                
                // Export buttons
                document.getElementById('exportExcel').addEventListener('click', () => this.exportExcel());
                document.getElementById('exportPDF').addEventListener('click', () => this.exportPDF());
                document.getElementById('exportJSON').addEventListener('click', () => this.exportJSON());
                document.getElementById('importJSON').addEventListener('click', () => this.importJSON());
                
                // Bottom navigation
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                        e.currentTarget.classList.add('active');
                        this.scrollToSection(e.currentTarget.dataset.section);
                    });
                });
                
                // File input for import
                document.getElementById('fileInput').addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            try {
                                const data = JSON.parse(event.target.result);
                                this.dataManager.importAll(data);
                                this.showToast('✅ Datos importados correctamente');
                                this.renderView();
                            } catch (error) {
                                this.showToast('❌ Error al importar datos');
                            }
                        };
                        reader.readAsText(file);
                    }
                });
            }
            
            navigateDate(direction) {
                if (this.currentView === 'day') {
                    this.currentDate.setDate(this.currentDate.getDate() + direction);
                } else if (this.currentView === 'week') {
                    this.currentDate.setDate(this.currentDate.getDate() + (direction * 7));
                } else if (this.currentView === 'month') {
                    this.currentDate.setMonth(this.currentDate.getMonth() + direction);
                }
                this.updateDatePicker();
                this.renderView();
            }
            
            updateDatePicker() {
                const dateInput = document.getElementById('currentDate');
                dateInput.value = this.currentDate.toISOString().split('T')[0];
            }
            
            renderView() {
                // Hide/show calendars
                document.getElementById('weekCalendar').classList.add('hidden');
                document.getElementById('monthCalendar').classList.add('hidden');
                
                if (this.currentView === 'week') {
                    this.renderWeekCalendar();
                } else if (this.currentView === 'month') {
                    this.renderMonthCalendar();
                }
                
                this.renderRecords();
                this.updateStats();
            }
            
            renderWeekCalendar() {
                const calendar = document.getElementById('weekCalendar');
                calendar.classList.remove('hidden');
                calendar.innerHTML = '';
                
                const startOfWeek = new Date(this.currentDate);
                startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay());
                
                const days = ['D', 'L', 'M', 'X', 'J', 'V', 'S'];
                
                for (let i = 0; i < 7; i++) {
                    const date = new Date(startOfWeek);
                    date.setDate(date.getDate() + i);
                    
                    const cell = document.createElement('div');
                    cell.className = 'day-cell';
                    
                    const { official, recovery } = this.dataManager.getRecordsInRange(date, date);
                    if (official.length > 0 || recovery.length > 0) {
                        cell.classList.add('has-records');
                    }
                    
                    if (date.toDateString() === this.currentDate.toDateString()) {
                        cell.classList.add('selected');
                    }
                    
                    cell.innerHTML = `
                        <div class="day-label">${days[i]}</div>
                        <div class="day-number">${date.getDate()}</div>
                    `;
                    
                    cell.addEventListener('click', () => {
                        this.currentDate = date;
                        this.updateDatePicker();
                        this.renderView();
                    });
                    
                    calendar.appendChild(cell);
                }
            }
            
            renderMonthCalendar() {
                const calendar = document.getElementById('monthCalendar');
                calendar.classList.remove('hidden');
                calendar.innerHTML = '';
                
                const year = this.currentDate.getFullYear();
                const month = this.currentDate.getMonth();
                
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const startDay = firstDay.getDay();
                
                // Previous month days
                const prevMonthLast = new Date(year, month, 0).getDate();
                for (let i = startDay - 1; i >= 0; i--) {
                    const cell = document.createElement('div');
                    cell.className = 'month-day other-month';
                    cell.textContent = prevMonthLast - i;
                    calendar.appendChild(cell);
                }
                
                // Current month days
                for (let day = 1; day <= lastDay.getDate(); day++) {
                    const date = new Date(year, month, day);
                    const cell = document.createElement('div');
                    cell.className = 'month-day';
                    cell.textContent = day;
                    
                    const { official, recovery } = this.dataManager.getRecordsInRange(date, date);
                    if (official.length > 0 || recovery.length > 0) {
                        cell.classList.add('has-records');
                    }
                    
                    if (date.toDateString() === new Date().toDateString()) {
                        cell.classList.add('today');
                    }
                    
                    if (date.toDateString() === this.currentDate.toDateString()) {
                        cell.classList.add('selected');
                    }
                    
                    cell.addEventListener('click', () => {
                        this.currentDate = date;
                        this.currentView = 'day';
                        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                        document.querySelector('.view-btn[data-view="day"]').classList.add('active');
                        this.updateDatePicker();
                        this.renderView();
                    });
                    
                    calendar.appendChild(cell);
                }
                
                // Next month days
                const remainingCells = 42 - (startDay + lastDay.getDate());
                for (let day = 1; day <= remainingCells; day++) {
                    const cell = document.createElement('div');
                    cell.className = 'month-day other-month';
                    cell.textContent = day;
                    calendar.appendChild(cell);
                }
            }
            
            getDateRange() {
                if (this.currentView === 'day') {
                    return { start: this.currentDate, end: this.currentDate };
                } else if (this.currentView === 'week') {
                    const start = new Date(this.currentDate);
                    start.setDate(start.getDate() - start.getDay());
                    const end = new Date(start);
                    end.setDate(end.getDate() + 6);
                    return { start, end };
                } else if (this.currentView === 'month') {
                    const start = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth(), 1);
                    const end = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() + 1, 0);
                    return { start, end };
                }
            }
            
            renderRecords() {
                const { start, end } = this.getDateRange();
                const { official, recovery } = this.dataManager.getRecordsInRange(start, end);
                
                // Render official records
                const officialContainer = document.getElementById('officialRecords');
                if (official.length === 0) {
                    officialContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div>No hay registros oficiales</div></div>';
                } else {
                    officialContainer.innerHTML = official.map((record, index) => `
                        <div class="record-item official">
                            <div class="record-info">
                                <div class="record-date">${new Date(record.date).toLocaleDateString('es-MX', { weekday: 'short', day: 'numeric', month: 'short' })}</div>
                                <div class="record-times">
                                    <span>📥 ${record.entrada}</span>
                                    <span>📤 ${record.salida}</span>
                                </div>
                            </div>
                            <div class="record-hours ${record.deficit > 0 ? 'negative' : 'positive'}">
                                ${TimeCalculator.minutesToHours(record.deficit)}
                            </div>
                            <button class="delete-btn" onclick="app.deleteOfficial(${this.dataManager.officialRecords.indexOf(record)})">🗑️</button>
                        </div>
                    `).join('');
                }
                
                // Render recovery records
                const recoveryContainer = document.getElementById('recoveryRecords');
                if (recovery.length === 0) {
                    recoveryContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div>No hay registros de recuperación</div></div>';
                } else {
                    recoveryContainer.innerHTML = recovery.map((record, index) => `
                        <div class="record-item recovery">
                            <div class="record-info">
                                <div class="record-date">${new Date(record.date).toLocaleDateString('es-MX', { weekday: 'short', day: 'numeric', month: 'short' })}</div>
                                <div class="record-times">
                                    <span>📥 ${record.entrada}</span>
                                    <span>📤 ${record.salida}</span>
                                </div>
                                ${record.concept ? `<div class="record-concept">${record.concept}</div>` : ''}
                            </div>
                            <div class="record-hours positive">
                                +${TimeCalculator.minutesToHours(record.hours)}
                            </div>
                            <button class="delete-btn" onclick="app.deleteRecovery(${this.dataManager.recoveryRecords.indexOf(record)})">🗑️</button>
                        </div>
                    `).join('');
                }
            }
            
            updateStats() {
                const { start, end } = this.getDateRange();
                const { official, recovery } = this.dataManager.getRecordsInRange(start, end);
                
                // Calculate totals
                const totalDeficit = official.reduce((sum, r) => sum + r.deficit, 0);
                const totalRecovery = recovery.reduce((sum, r) => sum + r.hours, 0);
                const balance = totalRecovery - totalDeficit;
                
                // Calculate expected hours (weekdays only)
                let expectedHours = 0;
                let currentDate = new Date(start);
                while (currentDate <= end) {
                    if (TimeCalculator.isWeekday(currentDate)) {
                        expectedHours += 8 * 60;
                    }
                    currentDate.setDate(currentDate.getDate() + 1);
                }
                
                // Update UI
                document.getElementById('officialHours').textContent = TimeCalculator.minutesToHours(expectedHours);
                document.getElementById('recoveryHours').textContent = TimeCalculator.minutesToHours(totalRecovery);
                document.getElementById('deficitHours').textContent = TimeCalculator.minutesToHours(totalDeficit);
                document.getElementById('balanceHours').textContent = TimeCalculator.minutesToHours(balance);
                
                // Update header badge
                const badge = document.getElementById('headerBalance');
                badge.textContent = TimeCalculator.minutesToHours(balance);
                badge.className = 'balance-badge';
                if (balance > 0) badge.classList.add('positive');
                if (balance < 0) badge.classList.add('negative');
            }
            
            saveOfficial() {
                const date = document.getElementById('currentDate').value;
                const entrada = document.getElementById('officialEntrada').value;
                const salida = document.getElementById('officialSalida').value;
                
                if (!entrada || !salida) {
                    this.showToast('⚠️ Por favor ingresa entrada y salida');
                    return;
                }
                
                const deficit = TimeCalculator.calculateDeficit(entrada, salida);
                
                const record = {
                    date: date,
                    entrada: entrada,
                    salida: salida,
                    deficit: deficit,
                    timestamp: new Date().toISOString()
                };
                
                this.dataManager.addOfficial(record);
                this.showToast('✅ Registro oficial guardado');
                this.renderView();
            }
            
            saveRecovery() {
                const date = document.getElementById('currentDate').value;
                const entrada = document.getElementById('recoveryEntrada').value;
                const salida = document.getElementById('recoverySalida').value;
                const concept = document.getElementById('recoveryConcept').value;
                
                if (!entrada || !salida) {
                    this.showToast('⚠️ Por favor ingresa entrada y salida');
                    return;
                }
                
                const hours = TimeCalculator.calculateDuration(entrada, salida);
                
                const record = {
                    date: date,
                    entrada: entrada,
                    salida: salida,
                    hours: hours,
                    concept: concept,
                    timestamp: new Date().toISOString()
                };
                
                this.dataManager.addRecovery(record);
                
                // Clear inputs
                document.getElementById('recoveryEntrada').value = '';
                document.getElementById('recoverySalida').value = '';
                document.getElementById('recoveryConcept').value = '';
                
                this.showToast('✅ Recuperación guardada');
                this.renderView();
            }
            
            deleteOfficial(index) {
                if (confirm('¿Eliminar este registro oficial?')) {
                    this.dataManager.deleteOfficial(index);
                    this.showToast('🗑️ Registro eliminado');
                    this.renderView();
                }
            }
            
            deleteRecovery(index) {
                if (confirm('¿Eliminar este registro de recuperación?')) {
                    this.dataManager.deleteRecovery(index);
                    this.showToast('🗑️ Registro eliminado');
                    this.renderView();
                }
            }
            
            exportExcel() {
                const { official, recovery } = this.dataManager.getRecordsInRange(
                    new Date(2020, 0, 1),
                    new Date(2030, 11, 31)
                );
                
                // Prepare official data
                const officialData = official.map(r => ({
                    'Fecha': new Date(r.date).toLocaleDateString('es-MX'),
                    'Tipo': 'Oficial',
                    'Entrada': r.entrada,
                    'Salida': r.salida,
                    'Horas': TimeCalculator.minutesToHours(8 * 60 - r.deficit),
                    'Déficit': TimeCalculator.minutesToHours(r.deficit),
                    'Concepto': ''
                }));
                
                // Prepare recovery data
                const recoveryData = recovery.map(r => ({
                    'Fecha': new Date(r.date).toLocaleDateString('es-MX'),
                    'Tipo': 'Recuperación',
                    'Entrada': r.entrada,
                    'Salida': r.salida,
                    'Horas': TimeCalculator.minutesToHours(r.hours),
                    'Déficit': '',
                    'Concepto': r.concept || ''
                }));
                
                // Combine and sort
                const allData = [...officialData, ...recoveryData].sort((a, b) => 
                    new Date(a.Fecha) - new Date(b.Fecha)
                );
                
                // Calculate totals
                const totalDeficit = official.reduce((sum, r) => sum + r.deficit, 0);
                const totalRecovery = recovery.reduce((sum, r) => sum + r.hours, 0);
                const balance = totalRecovery - totalDeficit;
                
                // Add summary
                allData.push({});
                allData.push({ 'Fecha': 'RESUMEN', 'Tipo': '', 'Entrada': '', 'Salida': '', 'Horas': '', 'Déficit': '', 'Concepto': '' });
                allData.push({ 'Fecha': 'Total Déficit', 'Horas': TimeCalculator.minutesToHours(totalDeficit) });
                allData.push({ 'Fecha': 'Total Recuperación', 'Horas': TimeCalculator.minutesToHours(totalRecovery) });
                allData.push({ 'Fecha': 'Balance Final', 'Horas': TimeCalculator.minutesToHours(balance) });
                
                // Create workbook
                const ws = XLSX.utils.json_to_sheet(allData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Control Horario');
                
                // Download
                const filename = `control-horario-${new Date().toISOString().split('T')[0]}.xlsx`;
                XLSX.writeFile(wb, filename);
                
                this.showToast('📊 Excel exportado');
            }
            
            exportPDF() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                const { official, recovery } = this.dataManager.getRecordsInRange(
                    new Date(2020, 0, 1),
                    new Date(2030, 11, 31)
                );
                
                // Title
                doc.setFontSize(18);
                doc.text('Control de Horario Laboral', 20, 20);
                
                doc.setFontSize(12);
                doc.text(`Generado: ${new Date().toLocaleDateString('es-MX')}`, 20, 30);
                
                // Calculate totals
                const totalDeficit = official.reduce((sum, r) => sum + r.deficit, 0);
                const totalRecovery = recovery.reduce((sum, r) => sum + r.hours, 0);
                const balance = totalRecovery - totalDeficit;
                
                // Summary
                let y = 45;
                doc.setFontSize(14);
                doc.text('RESUMEN GENERAL', 20, y);
                y += 10;
                
                doc.setFontSize(11);
                doc.text(`Registros Oficiales: ${official.length}`, 20, y);
                y += 7;
                doc.text(`Registros Recuperación: ${recovery.length}`, 20, y);
                y += 7;
                doc.text(`Total Déficit: ${TimeCalculator.minutesToHours(totalDeficit)}`, 20, y);
                y += 7;
                doc.text(`Total Recuperación: ${TimeCalculator.minutesToHours(totalRecovery)}`, 20, y);
                y += 7;
                doc.text(`Balance Final: ${TimeCalculator.minutesToHours(balance)}`, 20, y);
                
                // Official records
                y += 15;
                doc.setFontSize(14);
                doc.text('REGISTROS OFICIALES', 20, y);
                y += 10;
                
                doc.setFontSize(9);
                official.forEach(r => {
                    if (y > 270) {
                        doc.addPage();
                        y = 20;
                    }
                    doc.text(`${new Date(r.date).toLocaleDateString('es-MX')} - ${r.entrada} a ${r.salida} (Déficit: ${TimeCalculator.minutesToHours(r.deficit)})`, 20, y);
                    y += 7;
                });
                
                // Recovery records
                y += 10;
                if (y > 250) {
                    doc.addPage();
                    y = 20;
                }
                doc.setFontSize(14);
                doc.text('REGISTROS DE RECUPERACIÓN', 20, y);
                y += 10;
                
                doc.setFontSize(9);
                recovery.forEach(r => {
                    if (y > 270) {
                        doc.addPage();
                        y = 20;
                    }
                    doc.text(`${new Date(r.date).toLocaleDateString('es-MX')} - ${r.entrada} a ${r.salida} (+${TimeCalculator.minutesToHours(r.hours)})`, 20, y);
                    y += 5;
                    if (r.concept) {
                        doc.text(`Concepto: ${r.concept}`, 25, y);
                        y += 5;
                    }
                    y += 2;
                });
                
                // Save
                const filename = `control-horario-${new Date().toISOString().split('T')[0]}.pdf`;
                doc.save(filename);
                
                this.showToast('📄 PDF exportado');
            }
            
            exportJSON() {
                const data = this.dataManager.exportAll();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup-horario-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                
                this.showToast('💾 Backup guardado');
            }
            
            importJSON() {
                document.getElementById('fileInput').click();
            }
            
            scrollToSection(section) {
                const cards = document.querySelectorAll('.card');
                let index = 0;
                
                if (section === 'official') index = 2;
                else if (section === 'recovery') index = 3;
                else if (section === 'stats') index = 1;
                else if (section === 'export') index = 4;
                
                cards[index].scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            
            showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.remove();
                }, 3000);
            }
        }
        
        // Initialize app
